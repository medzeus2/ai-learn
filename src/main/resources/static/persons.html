<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>人员信息维护</title>
    <style>
        body{margin:0;font-family:"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f3fff6 0%,#e7f7eb 100%);color:#214d2e}
        .header{padding:12px 16px;border-bottom:1px solid #a5d8b4;background:#dff4e6;font-size:20px;font-weight:700}
        .page{padding:14px}
        .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
        input,select{padding:7px 8px;border:1px solid #9cccac;border-radius:6px;background:#f7fff9}
        #keyword{width:380px;max-width:100%}
        .btn{border:1px solid #7fbc90;background:linear-gradient(180deg,#f2fff5 0%,#d5efd9 100%);color:#245c33;padding:6px 12px;border-radius:6px;cursor:pointer;text-decoration:none}
        .btn-danger{border-color:#cf6e6e;color:#8c2222;background:linear-gradient(180deg,#fff2f2 0%,#f3cdcd 100%)}
        .success{display:none;margin-bottom:10px;border:1px solid #93d6a7;background:#e6f8eb;color:#1f6a33;padding:10px;border-radius:6px}
        table{width:100%;border-collapse:collapse;background:#fbfffc}
        th,td{border:1px solid #c8e3cf;padding:10px 8px;text-align:left}
        thead th{background:#d8f1de}
        tbody tr:nth-child(even){background:#f3fcf5}
        .tag-enabled{color:#1f8a3a;font-weight:600}.tag-disabled{color:#6e7f74;font-weight:600}
        .modal-mask{display:none;position:fixed;inset:0;background:rgba(27,58,36,.35);z-index:1000}
        .modal{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;max-width:calc(100vw - 24px);background:#f4fff6;border:1px solid #98cfa9;border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.18);z-index:1001}
        .modal-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#dff4e6;border-bottom:1px solid #a5d8b4;font-weight:700}
        .modal-body{padding:12px}
        .form-item{margin-bottom:10px}.form-item label{display:inline-block;width:90px}
        .form-item input,.form-item select{width:320px;max-width:calc(100% - 100px)}
        .error{color:#c40000;font-size:12px;margin-left:94px;min-height:16px}
        .empty{text-align:center;color:#668272}
    </style>
</head>
<body>
<div class="header">人员信息维护</div>
<div class="page">
    <div id="success" class="success"></div>
    <div class="toolbar">
        <input id="keyword" placeholder="请输入姓名/拼音/拼音首字母，例如：张三、zhangsan、zs" />
        <button class="btn" id="searchBtn">检索</button>
        <button class="btn" id="resetBtn">重置</button>
        <button class="btn" id="openCreateBtn">+ 新增人员</button>
    </div>

    <table>
        <thead><tr><th>ID</th><th>姓名</th><th>性别</th><th>年龄</th><th>身份证号</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="personRows"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
    </table>
</div>

<div id="mask" class="modal-mask"></div>
<div id="editor" class="modal">
    <div class="modal-head"><span id="editorTitle">新增人员</span><button id="closeEditor" class="btn">关闭</button></div>
    <div class="modal-body">
        <div class="form-item"><label>姓名</label><input id="name"><div class="error" id="err_name"></div></div>
        <div class="form-item"><label>性别</label><select id="gender"></select><div class="error" id="err_gender"></div></div>
        <div class="form-item"><label>年龄</label><input id="age" type="number"><div class="error" id="err_age"></div></div>
        <div class="form-item"><label>身份证号</label><input id="idCard"><div class="error" id="err_idCard"></div></div>
        <div class="form-item"><label>状态</label><select id="status"></select><div class="error" id="err_status"></div></div>
        <div style="margin-left:94px;display:flex;gap:8px">
            <button class="btn" id="saveBtn">保存</button>
            <button class="btn" id="cancelBtn">取消</button>
        </div>
    </div>
</div>

<script>
const state={persons:[],editingId:null,meta:null,genderMap:{},statusMap:{}};
const el=id=>document.getElementById(id);
const success=(msg)=>{const s=el('success');s.textContent=msg;s.style.display='block';setTimeout(()=>s.style.display='none',1800)};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

async function request(url,opts={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});if(r.status===204)return null;const d=await r.json().catch(()=>({}));if(!r.ok)throw d;return d;}
async function loadMeta(){state.meta=await request('/api/persons/meta');state.genderMap=Object.fromEntries(state.meta.genders.map(i=>[i.value,i.label]));state.statusMap=Object.fromEntries(state.meta.statuses.map(i=>[i.value,i.label]));fillOptions('gender',state.meta.genders);fillOptions('status',state.meta.statuses);}
function fillOptions(id,items){el(id).innerHTML='<option value="">请选择</option>'+items.map(i=>`<option value="${i.value}">${i.label}</option>`).join('')}

async function loadPersons(){
  const kw=el('keyword').value.trim();
  const params=kw?`?keyword=${encodeURIComponent(kw)}`:'';
  state.persons=await request('/api/persons'+params);
  const rows=el('personRows');
  if(!state.persons.length){rows.innerHTML='<tr><td colspan="7" class="empty">暂无数据</td></tr>';return;}
  rows.innerHTML=state.persons.map(p=>`<tr>
    <td>${p.id}</td><td>${esc(p.name)}</td><td>${esc(state.genderMap[p.gender]||'')}</td><td>${esc(p.age)}</td><td>${esc(p.idCard)}</td>
    <td><span class="${p.status==='ENABLED'?'tag-enabled':'tag-disabled'}">${esc(state.statusMap[p.status]||'')}</span></td>
    <td><button class="btn" onclick="openEdit(${p.id})">编辑</button>
    <button class="btn btn-danger" onclick="removePerson(${p.id})">删除</button></td></tr>`).join('');
}

function openModal(){el('mask').style.display='block';el('editor').style.display='block'}
function closeModal(){el('mask').style.display='none';el('editor').style.display='none';clearErrors()}
function clearErrors(){['name','gender','age','idCard','status'].forEach(k=>el('err_'+k).textContent='')}
function formData(){return {name:el('name').value.trim(),gender:el('gender').value||null,age:el('age').value?Number(el('age').value):null,idCard:el('idCard').value.trim(),status:el('status').value||null}}
function fillForm(p){el('name').value=p?.name||'';el('gender').value=p?.gender||'';el('age').value=p?.age??'';el('idCard').value=p?.idCard||'';el('status').value=p?.status||''}

async function openCreate(){state.editingId=null;el('editorTitle').textContent='新增人员';fillForm(null);openModal()}
async function openEdit(id){const p=await request('/api/persons/'+id);state.editingId=id;el('editorTitle').textContent='编辑人员';fillForm(p);openModal()}
async function savePerson(){
  clearErrors();
  const data=formData();
  try{
    if(state.editingId){await request('/api/persons/'+state.editingId,{method:'PUT',body:JSON.stringify(data)});success('修改成功');}
    else{await request('/api/persons',{method:'POST',body:JSON.stringify(data)});success('新增成功');}
    closeModal();await loadPersons();
  }catch(e){
    if(e.message){el('err_idCard').textContent=e.message;return;}
    ['name','gender','age','idCard','status'].forEach(k=>{if(e[k])el('err_'+k).textContent=e[k]});
  }
}
async function removePerson(id){if(!confirm('确认删除?'))return;await request('/api/persons/'+id,{method:'DELETE'});success('删除成功');await loadPersons();}

window.openEdit=openEdit;window.removePerson=removePerson;
el('openCreateBtn').onclick=openCreate;el('closeEditor').onclick=closeModal;el('cancelBtn').onclick=closeModal;el('saveBtn').onclick=savePerson;
el('searchBtn').onclick=loadPersons;el('resetBtn').onclick=()=>{el('keyword').value='';loadPersons()};
el('keyword').addEventListener('keydown',e=>{if(e.key==='Enter')loadPersons()});

(async function init(){await loadMeta();await loadPersons();})();
</script>
</body>
</html>
