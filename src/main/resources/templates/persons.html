<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>人员信息维护</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/resources/css/ext-all.css">
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .page-wrapper {
            padding: 12px;
        }

        .x-form-item {
            margin-bottom: 10px;
        }

        .x-form-item label {
            display: inline-block;
            width: 88px;
            margin-right: 8px;
        }

        .x-form-item input[type="text"],
        .x-form-item input[type="number"],
        .x-form-item select {
            width: 260px;
            padding: 4px;
            border: 1px solid #b5b8c8;
        }

        .x-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .x-btn {
            border: 1px solid #8db2e3;
            background: #dfe8f6;
            color: #15428b;
            padding: 4px 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .x-btn-danger {
            border-color: #b85450;
            color: #b30000;
            background: #f5d4d4;
        }

        .x-grid3 {
            width: 100%;
            border-collapse: collapse;
        }

        .x-grid3 th,
        .x-grid3 td {
            border: 1px solid #d0d0d0;
            padding: 8px;
            text-align: left;
        }

        .x-grid3 thead th {
            background: #f0f0f0;
        }

        .x-tag-enabled {
            color: #2d862d;
        }

        .x-tag-disabled {
            color: #666;
        }

        .x-error {
            color: #c40000;
            margin-left: 96px;
            font-size: 12px;
        }

        .x-success {
            margin-bottom: 10px;
            border: 1px solid #99bbe8;
            background: #dfe8f6;
            color: #15428b;
            padding: 8px;
        }

        .search-bar {
            margin-bottom: 10px;
        }

        .search-bar input {
            width: 350px;
            margin-right: 6px;
            padding: 4px;
            border: 1px solid #b5b8c8;
        }
    </style>
</head>
<body>
<div id="app-root">
    <div class="page-wrapper">
        <div th:if="${success}" class="x-success" th:text="${success}"></div>

        <div id="editor-content">
            <form th:action="${editing} ? @{/persons/{id}(id=${person.id}, keyword=${keyword})} : @{/persons(keyword=${keyword})}" th:object="${person}" method="post">
                <div class="x-form-item">
                    <label>姓名</label>
                    <input type="text" th:field="*{name}">
                    <div class="x-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="x-form-item">
                    <label>性别</label>
                    <select th:field="*{gender}">
                        <option value="">请选择</option>
                        <option th:each="g : ${genders}" th:value="${g}" th:text="${g.label}"></option>
                    </select>
                    <div class="x-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                </div>
                <div class="x-form-item">
                    <label>年龄</label>
                    <input type="number" th:field="*{age}">
                    <div class="x-error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                </div>
                <div class="x-form-item">
                    <label>身份证号</label>
                    <input type="text" th:field="*{idCard}">
                    <div class="x-error" th:if="${#fields.hasErrors('idCard')}" th:errors="*{idCard}"></div>
                </div>
                <div class="x-form-item">
                    <label>状态</label>
                    <select th:field="*{status}">
                        <option value="">请选择</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                    <div class="x-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>

                <div class="x-toolbar">
                    <button class="x-btn" type="submit" th:text="${editing} ? '保存修改' : '新增'"></button>
                    <a class="x-btn" th:if="${editing}" th:href="@{/persons(keyword=${keyword})}">取消</a>
                </div>
            </form>
        </div>

        <div id="list-content">
            <form class="search-bar" method="get" th:action="@{/persons}">
                <input type="text" name="keyword" placeholder="请输入姓名/拼音/拼音首字母，例如：张三、zhangsan、zs" th:value="${keyword}">
                <button class="x-btn" type="submit">检索</button>
                <a th:href="@{/persons}" class="x-btn">重置</a>
            </form>

            <table class="x-grid3">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>身份证号</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="7">暂无数据</td>
                </tr>
                <tr th:each="item : ${persons}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.gender.label}"></td>
                    <td th:text="${item.age}"></td>
                    <td th:text="${item.idCard}"></td>
                    <td>
                        <span th:class="${item.status.name() == 'ENABLED'} ? 'x-tag-enabled' : 'x-tag-disabled'" th:text="${item.status.label}"></span>
                    </td>
                    <td>
                        <a class="x-btn" th:href="@{/persons/{id}/edit(id=${item.id}, keyword=${keyword})}">编辑</a>
                        <form th:action="@{/persons/{id}/delete(id=${item.id})}" method="post" style="display: inline;">
                            <button type="submit" class="x-btn x-btn-danger" onclick="return confirm('确认删除?')">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/adapter/ext/ext-base.js"></script>
<script src="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/ext-all.js"></script>
<script>
    if (window.Ext && Ext.onReady) {
        Ext.onReady(function () {
            Ext.QuickTips.init();
            new Ext.Viewport({
            layout: 'border',
            items: [{
                region: 'north',
                xtype: 'box',
                autoEl: {
                    tag: 'div',
                    html: '<div style="padding:10px 14px;border-bottom:1px solid #99bbe8;background:#dfe8f6;color:#15428b;font-size:18px;">人员信息维护（Ext2）</div>'
                },
                height: 50
            }, {
                region: 'west',
                title: '人员编辑',
                width: 420,
                split: true,
                autoScroll: true,
                contentEl: 'editor-content'
            }, {
                region: 'center',
                title: '人员列表',
                autoScroll: true,
                contentEl: 'list-content'
            }]
        });

            // Ext 加载成功时启用 viewport 布局
        });
    } else {
        // Ext 资源加载失败时保留静态页面，避免白屏
        console.warn('Ext2 resources failed to load, fallback to static layout.');
    }
</script>
</body>
</html>
