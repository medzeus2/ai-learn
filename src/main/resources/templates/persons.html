<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>人员信息维护</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/resources/css/ext-all.css">
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #f3fff6 0%, #e7f7eb 100%);
            color: #214d2e;
        }

        .page-wrapper {
            padding: 14px;
        }

        .x-success {
            margin-bottom: 12px;
            border: 1px solid #93d6a7;
            background: #e6f8eb;
            color: #1f6a33;
            padding: 10px;
            border-radius: 6px;
        }

        .search-bar {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-bar input {
            width: 380px;
            max-width: 100%;
            padding: 7px 8px;
            border: 1px solid #9cccac;
            border-radius: 6px;
            background: #f7fff9;
        }

        .x-btn {
            border: 1px solid #7fbc90;
            background: linear-gradient(180deg, #f2fff5 0%, #d5efd9 100%);
            color: #245c33;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
        }

        .x-btn:hover {
            background: linear-gradient(180deg, #e4f9e9 0%, #c4e7cb 100%);
        }

        .x-btn-danger {
            border-color: #cf6e6e;
            color: #8c2222;
            background: linear-gradient(180deg, #fff2f2 0%, #f3cdcd 100%);
        }

        .x-grid3 {
            width: 100%;
            border-collapse: collapse;
            background: #fbfffc;
            border-radius: 8px;
            overflow: hidden;
        }

        .x-grid3 th,
        .x-grid3 td {
            border: 1px solid #c8e3cf;
            padding: 10px 8px;
            text-align: left;
        }

        .x-grid3 thead th {
            background: #d8f1de;
            color: #215736;
        }

        .x-grid3 tbody tr:nth-child(even) {
            background: #f3fcf5;
        }

        .x-tag-enabled {
            color: #1f8a3a;
            font-weight: 600;
        }

        .x-tag-disabled {
            color: #6e7f74;
            font-weight: 600;
        }

        .editor-shell {
            padding: 6px 8px;
        }

        .editor-title {
            margin: 0 0 8px;
            color: #1e6133;
            font-size: 18px;
        }

        .x-form-item {
            margin-bottom: 11px;
        }

        .x-form-item label {
            display: inline-block;
            width: 88px;
            margin-right: 8px;
        }

        .x-form-item input[type="text"],
        .x-form-item input[type="number"],
        .x-form-item select {
            width: 280px;
            max-width: calc(100% - 108px);
            padding: 6px 8px;
            border: 1px solid #9cccac;
            border-radius: 6px;
            background: #f7fff9;
        }

        .x-toolbar {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            margin-left: 96px;
        }

        .x-error {
            color: #c40000;
            margin-left: 96px;
            margin-top: 4px;
            font-size: 12px;
        }

        .empty-tip {
            text-align: center;
            color: #668272;
        }
    </style>
</head>
<body>
<div id="app-root">
    <div class="page-wrapper">
        <div th:if="${success}" class="x-success" th:text="${success}"></div>

        <div id="list-content">
            <form class="search-bar" method="get" th:action="@{/persons}">
                <input type="text" name="keyword" placeholder="请输入姓名/拼音/拼音首字母，例如：张三、zhangsan、zs" th:value="${keyword}">
                <button class="x-btn" type="submit">检索</button>
                <a th:href="@{/persons}" class="x-btn">重置</a>
                <button id="open-editor-btn" class="x-btn" type="button">+ 新增人员</button>
            </form>

            <table class="x-grid3">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>身份证号</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="7" class="empty-tip">暂无数据</td>
                </tr>
                <tr th:each="item : ${persons}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.gender.label}"></td>
                    <td th:text="${item.age}"></td>
                    <td th:text="${item.idCard}"></td>
                    <td>
                        <span th:class="${item.status.name() == 'ENABLED'} ? 'x-tag-enabled' : 'x-tag-disabled'" th:text="${item.status.label}"></span>
                    </td>
                    <td>
                        <a class="x-btn" th:href="@{/persons/{id}/edit(id=${item.id}, keyword=${keyword})}">编辑</a>
                        <form th:action="@{/persons/{id}/delete(id=${item.id})}" method="post" style="display: inline;">
                            <button type="submit" class="x-btn x-btn-danger" onclick="return confirm('确认删除?')">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="editor-content" class="editor-shell">
            <h3 class="editor-title" th:text="${editing} ? '编辑人员' : '新增人员'"></h3>
            <form th:action="${editing} ? @{/persons/{id}(id=${person.id}, keyword=${keyword})} : @{/persons(keyword=${keyword})}" th:object="${person}" method="post">
                <div class="x-form-item">
                    <label>姓名</label>
                    <input type="text" th:field="*{name}">
                    <div class="x-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="x-form-item">
                    <label>性别</label>
                    <select th:field="*{gender}">
                        <option value="">请选择</option>
                        <option th:each="g : ${genders}" th:value="${g}" th:text="${g.label}"></option>
                    </select>
                    <div class="x-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                </div>
                <div class="x-form-item">
                    <label>年龄</label>
                    <input type="number" th:field="*{age}">
                    <div class="x-error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                </div>
                <div class="x-form-item">
                    <label>身份证号</label>
                    <input type="text" th:field="*{idCard}">
                    <div class="x-error" th:if="${#fields.hasErrors('idCard')}" th:errors="*{idCard}"></div>
                </div>
                <div class="x-form-item">
                    <label>状态</label>
                    <select th:field="*{status}">
                        <option value="">请选择</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                    <div class="x-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>
                <div class="x-toolbar">
                    <button class="x-btn" type="submit" th:text="${editing} ? '保存修改' : '新增'"></button>
                    <a class="x-btn" th:if="${editing}" th:href="@{/persons(keyword=${keyword})}">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/adapter/ext/ext-base.js"></script>
<script src="https://cdn.jsdelivr.net/gh/tvheadend/extjs@2.3.1/ext-all.js"></script>
<script th:inline="javascript">
    if (window.Ext && Ext.onReady) {
        Ext.onReady(function () {
            Ext.QuickTips.init();

            var editing = /*[[${editing}]]*/ false;
            var hasErrors = /*[[${#fields.hasErrors('*')}]]*/ false;

            var editorWin = new Ext.Window({
                title: editing ? '编辑人员' : '新增人员',
                width: 520,
                autoHeight: true,
                modal: true,
                resizable: false,
                closeAction: 'hide',
                bodyStyle: 'background:#f4fff6;padding:8px;',
                contentEl: 'editor-content'
            });

            new Ext.Viewport({
                layout: 'border',
                items: [{
                    region: 'north',
                    xtype: 'box',
                    autoEl: {
                        tag: 'div',
                        html: '<div style="padding:11px 16px;border-bottom:1px solid #a5d8b4;background:#dff4e6;color:#215736;font-size:19px;font-weight:600;">人员信息维护</div>'
                    },
                    height: 56
                }, {
                    region: 'center',
                    title: '人员列表',
                    autoScroll: true,
                    bodyStyle: 'background:#effaf1;padding:8px;',
                    contentEl: 'list-content'
                }]
            });

            Ext.get('open-editor-btn').on('click', function () {
                editorWin.setTitle('新增人员');
                editorWin.show();
            });

            if (editing || hasErrors) {
                editorWin.setTitle(editing ? '编辑人员' : '新增人员');
                editorWin.show();
            }
        });
    } else {
        console.warn('Ext2 resources failed to load, fallback to static layout.');
    }
</script>
</body>
</html>
